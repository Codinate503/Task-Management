<!DOCTYPE html>
<html>
    
    <head>
        <meta charset="UTF-8" name="viewport" content="width = device-width, initial-scale = 1.0">
        <title>Task Management</title>

        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">

        <link rel="stylesheet" href="styles.css"/>
    </head>

    <body>
        <!-- WEBSITE LAYOUT -->
        <div id="mainGrid">
            
            <!-- HEADER -->
            <div id="header">
               
                <h1 class="headerTxt main-font">Today's Tasks</h1>
                
                <div class="headerFlex">
                
                    <div class="dropdown">
                        <img id="dropdownbutton" src="icons/funnel_white.svg" class="headerIcons">
                        <div id="dropdowncontent" class="dropdown-content second_font">
                            <p class="second_font filtertitle"> Sort By:</p>
                            <button class="second_font dueDate option">▸&nbsp;Due Date</button>      
                            <button class="second_font priority option">▸&nbsp;Priority</button>
                            <div class="hideCompDiv">
                                <input type="checkbox" id="HideComp">
                                <label for="HideComp" class="second_font hideComp"> Hide Completed</label>
                            </div>
                        </div>
                    </div> 
                        <img src="icons/search_white.svg" class="headerIcons" id="searchToggle">
                    <div id="searchBar">
                        <input type="text" id="searchInput" placeholder="Search tasks...">
                    </div>
                </div>

            </div>


            <!-- SIDEBAR -->
            <div id="sidebar">
                
                <div class="sidebarFlex">


                    <div class="profilePic"> 
                        <!--  <input type="file"> -->
                        
                        <label for="userPhoto"> <img src="icons/placeholder.png" class="userPic" id="profilePic"> </label>

                        <input type="file" accept="image/jpeg, image/png, image/jpg" id="userPhoto" class="photoInput">
                    </div>
                        


                    <img src="icons/house_white.svg" class="sidebarIcons" id="homeBtn">
                    <img src="icons/barchart_white.svg" class="sidebarIcons" id="statsBtn">
                    <img src="icons/plus_white.svg" class="sidebarIcons" id="addBtn">  
                </div>

            </div>

            <!-- MAIN BODY -->
            <div id="mainbody">
                <div class="mainFlex">
                    <div class="tasks-container" id="tasksContainer">
                        <!-- Cards will be generated here by JavaScript -->
                    </div>
                </div>
            </div>
        </div>

        <!-- POPUP -->
        <div id="popupOverlay">
            <div id="popupBox">
                <h2 class="main-font popupBoxtext">Edit Task</h2>

                <input type="text" id="editTitle" placeholder="Title">
                <textarea id="editDescription" placeholder="Description"></textarea>

                <input type="date" id="editDate">

                <select id="editPriority">
                    <option value="Low">Low</option>
                    <option value="Medium">Medium</option>
                    <option value="High">High</option>
                </select>

                <div class="popupButtons">
                    <button id="saveBtn">Save</button>
                    <button id="deleteBtn">Delete</button>
                    <button id="cancelBtn">Cancel</button>
                </div>
            </div>
        </div>
        
        <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="app.js"></script>
    </body>
   
</html>
